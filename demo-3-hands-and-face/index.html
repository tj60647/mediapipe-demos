  PURPOSE
  This is the HTML wrapper for the Demo 3 combined hands + face mesh sketch.
  It loads the MediaPipe Hands and FaceMesh libraries from a CDN, then loads
  sketch.js which contains all of the demo code.

  HOW TO USE
  Open this file in any modern browser (Chrome or Edge recommended).
  Allow the browser to access your webcam when prompted.

  The canvas shows the webcam feed on the left half and the landmark
  overlay on the right half, side by side.

  If you are using OpenProcessing, paste the contents of sketch.js into
  a new sketch there — OpenProcessing automatically provides the HTML context.
  ============================================================================
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Demo 3 — Hands and Face Combined | MediaPipe Demos</title>
  <link rel="stylesheet" href="../shared/style.css">
  <script defer src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.js"></script>
  <script defer src="../shared/utils.js"></script>
  <script defer src="sketch.js"></script>
</head>
<body>
  <h1 style="color: #c084fc">Demo 3 — Hands and Face Combined</h1>
  <p class="subtitle">MediaPipe Hands + FaceMesh • Side-by-side: raw feed left, landmarks right</p>
  <div id="cameraSelectWrapper" style="display:none;" class="camera-controls">
    <label for="cameraSelect">Camera:</label>
    <select id="cameraSelect"></select>
  </div>
  <p id="browserWarning"></p>
  <p id="errorMessage"></p>
  <p id="loadingMessage">Loading AI models…</p>
  <div class="camera-controls">
    <label for="handCountSelect">Hands:</label>
    <select id="handCountSelect">
      <option value="1">1 hand</option>
      <option value="2" selected>2 hands</option>
    </select>
  </div>
  <div class="media-container">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
  </div>
  <footer>
    <a href="../gallery/index.html">← Back to Gallery</a>
    &nbsp;|&nbsp;
    MediaPipe Demos — MDes Prototyping, CCA
  </footer>
</body>
</html>
