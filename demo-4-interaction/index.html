  PURPOSE
  This is the HTML wrapper for the Demo 4 interaction-basics sketch. It loads
  the MediaPipe Hands and FaceMesh libraries from a CDN, then loads sketch.js
  which contains all of the demo code.

  HOW TO USE
  Open this file in any modern browser (Chrome or Edge recommended).
  Allow the browser to access your webcam when prompted.

  This demo shows four interaction patterns built from landmark coordinates:
    1. Distance  — index fingertip to nose tip, shown as a colour-coded bar
    2. Zones     — which horizontal third of the frame the fingertip is in
    3. Count     — how many fingers are raised
    4. Mapping   — fingertip height mapped to a colour strip

  If you are using OpenProcessing, paste the contents of sketch.js into
  a new sketch there — OpenProcessing automatically provides the HTML context.
  ============================================================================
-->
