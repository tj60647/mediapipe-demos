  PURPOSE
  This is the HTML wrapper for the Demo 2 face-mesh sketch. sketch.js loads
  the MediaPipe Tasks Vision library via dynamic import (no additional <script>
  tag is needed here) and runs all demo logic.

  HOW TO USE
  Open this file in any modern browser (Chrome or Edge recommended).
  Allow the browser to access your webcam when prompted.

  If you are using OpenProcessing, paste the contents of sketch.js into
  a new sketch there — OpenProcessing automatically provides the HTML context.
  ============================================================================
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Demo 2 — Face Mesh | MediaPipe Demos</title>
  <script defer src="sketch.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e0e0e0;
    }

    h1 {
      font-size: 1.2rem;
      font-weight: 600;
      margin: 1rem 0 0.25rem;
      color: #60a5fa;
    }

    p.subtitle {
      font-size: 0.85rem;
      color: #888;
      margin: 0 0 1rem;
    }

    .media-container {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: 10px;
      padding: 0 1rem;
    }

    #video {
      display: none;
    }

    #canvas {
      max-width: 100%;
      height: auto;
      border: 1px solid #333;
      border-radius: 6px;
    }

    footer {
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: #444;
      padding-bottom: 2rem;
    }

    footer a {
      color: #555;
      text-decoration: none;
    }

    .camera-controls {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
      font-size: 0.85rem;
    }

    .camera-controls label {
      color: #aaa;
    }

    .camera-controls select {
      background: #222;
      color: #e0e0e0;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 0.25rem 0.5rem;
      font-size: 0.85rem;
      cursor: pointer;
    }

    .camera-controls select:focus {
      outline: none;
      border-color: #666;
    }
  </style>
</head>
<body>
  <h1>Demo 2 — Face Mesh</h1>
  <p class="subtitle">MediaPipe FaceMesh • Up to 478 real-time facial landmarks from your webcam</p>
  <div id="cameraSelectWrapper" style="display:none;" class="camera-controls">
    <label for="cameraSelect">Camera:</label>
    <select id="cameraSelect"></select>
  </div>
  <div class="media-container">
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
  </div>
  <footer>
    <a href="../gallery/index.html">← Back to Gallery</a>
    &nbsp;|&nbsp;
    MediaPipe Demos — MDes Prototyping, CCA
  </footer>
</body>
</html>
